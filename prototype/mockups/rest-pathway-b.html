<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rewire — Rest B · Swipe to rest</title>
<style>
  :root {
    --ink: #07070C;
    --raised: rgba(16,16,24,0.78);
    --text-1: #F4F2EC; --text-2: #8E8E9E; --text-3: #55555F;
    --hairline: rgba(255,255,255,0.08);
    --tide: #4DB6C8; --ember: #E07A4F; --orchid: #B07BC8; --choose: #8B7BFF; --accept: #3EDDC5;
    --ui: "SF Pro Text", -apple-system, "Segoe UI", system-ui, sans-serif;
    --voice: "New York", "Iowan Old Style", Georgia, serif;
    --reveal: 88px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { min-height: 100%; background: #101016; font-family: var(--ui); color: var(--text-1); }
  .stage {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 28px; padding: 36px 20px 48px;
  }
  .meta { text-align: center; max-width: 400px; }
  .meta .tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accept); font-weight: 600; margin-bottom: 8px;
  }
  .meta h1 { font-family: var(--voice); font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .meta p { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .meta a {
    display: inline-block; margin-top: 12px; font-size: 12px; color: var(--text-3);
    text-decoration: none;
  }
  .meta a:hover { color: var(--text-2); }

  .phone {
    position: relative; width: 390px; height: 844px; background: var(--ink);
    border-radius: 54px; overflow: hidden; flex: none;
    box-shadow: 0 0 0 10px #000, 0 0 0 12px #2a2a30, 0 40px 100px rgba(0,0,0,0.55);
    touch-action: pan-y;
  }
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 118px; height: 34px; background: #000; border-radius: 20px; z-index: 80;
  }
  .aurora {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 90% 55% at 18% 8%, rgba(62,221,197,0.12), transparent 55%),
      radial-gradient(ellipse 70% 45% at 88% 28%, rgba(139,123,255,0.12), transparent 50%),
      var(--ink);
  }

  .ui {
    position: absolute; inset: 0; z-index: 10;
    padding: 62px 24px 0; display: flex; flex-direction: column;
  }
  .head {
    display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px;
  }
  .greeting { font-family: var(--voice); font-size: 30px; font-weight: 500; }
  .sub { font-size: 13px; color: var(--text-2); margin-top: 6px; }
  .moon-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.05); border: 1px solid var(--hairline);
    color: var(--text-3); font-size: 18px; cursor: pointer;
    display: grid; place-items: center; position: relative;
    transition: color 0.35s, box-shadow 0.45s, border-color 0.35s;
  }
  .moon-btn.has-rest {
    color: var(--text-2);
    border-color: color-mix(in srgb, var(--choose) 40%, transparent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--choose) 25%, transparent);
  }
  .moon-btn.receive { animation: catch 0.65s cubic-bezier(0.22,1,0.36,1); }
  @keyframes catch {
    0% { transform: scale(1); }
    40% { transform: scale(1.14); color: var(--choose); }
    100% { transform: scale(1); }
  }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 16px 14px; border-radius: 22px; margin-bottom: 18px;
    background: linear-gradient(rgba(255,255,255,0.04), transparent), var(--raised);
    border: 1px solid var(--hairline);
  }
  .stats .c { text-align: center; }
  .stats .v { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats .l {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-3); font-weight: 600; margin-top: 4px;
  }

  .tip {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; min-height: 20px;
    font-family: var(--voice); font-style: italic; font-size: 13px; color: var(--text-3);
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.5s, transform 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .tip.on { opacity: 1; transform: none; }
  .tip .arrow {
    width: 28px; height: 16px; position: relative; flex: none; opacity: 0.7;
  }
  .tip .arrow::before {
    content: ""; position: absolute; left: 0; right: 8px; top: 50%;
    height: 1px; background: var(--text-3);
  }
  .tip .arrow::after {
    content: ""; position: absolute; right: 4px; top: 50%;
    width: 7px; height: 7px; border-right: 1px solid var(--text-3);
    border-bottom: 1px solid var(--text-3); transform: translateY(-50%) rotate(-45deg);
  }
  .tip.hand .finger {
    width: 10px; height: 10px; border-radius: 50%;
    background: color-mix(in srgb, var(--accept) 50%, transparent);
    box-shadow: 0 0 10px color-mix(in srgb, var(--accept) 40%, transparent);
    animation: swipeDemo 2.4s ease-in-out infinite;
  }
  @keyframes swipeDemo {
    0%, 15% { transform: translateX(0); opacity: 0.3; }
    45%, 55% { transform: translateX(36px); opacity: 1; }
    85%, 100% { transform: translateX(0); opacity: 0.3; }
  }

  .cards { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow: hidden; }

  .swipe-row {
    position: relative;
    border-radius: 26px;
    overflow: hidden;
    touch-action: pan-y;
  }
  .swipe-row.leaving {
    transition: opacity 0.4s, transform 0.55s cubic-bezier(0.22,1,0.36,1), height 0.4s, margin 0.4s, padding 0.4s;
    opacity: 0; transform: translate(40px, -200px) scale(0.2);
    transform-origin: 90% 0%;
    pointer-events: none;
  }

  .action {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 22px;
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--choose) 15%, transparent),
      color-mix(in srgb, var(--choose) 55%, #1a1428));
    z-index: 0;
  }
  .action .label {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-1); font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    opacity: 0.35; transform: scale(0.92);
    transition: opacity 0.15s, transform 0.2s;
  }
  .action .label .ico { font-size: 20px; line-height: 1; }
  .swipe-row.armed .action .label {
    opacity: 1; transform: scale(1);
  }

  .pcard {
    --hue: var(--tide);
    position: relative; z-index: 1;
    border-radius: 26px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--hue) 8%, transparent), transparent 55%),
                linear-gradient(rgba(255,255,255,0.035), transparent), var(--raised);
    border: 1px solid color-mix(in srgb, var(--hue) 22%, var(--hairline));
    padding: 18px 18px 16px;
    cursor: grab;
    user-select: none;
    will-change: transform;
  }
  .pcard:active { cursor: grabbing; }
  .pcard.snapping {
    transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .pcard-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .pname { font-size: 18px; font-weight: 600; padding-top: 2px; }
  .spark {
    font-size: 12px; color: var(--hue); width: 28px; height: 28px;
    display: grid; place-items: center;
    filter: drop-shadow(0 0 5px color-mix(in srgb, var(--hue) 70%, transparent));
  }
  .spark.dim { color: var(--text-3); filter: none; }
  .pcard-meta {
    display: flex; justify-content: space-between; align-items: center; margin-top: 14px;
  }
  .stage-l {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 600; color: var(--hue);
  }
  .togo { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .thread {
    margin-top: 12px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.06);
  }
  .thread > i {
    display: block; height: 100%; width: var(--p);
    background: linear-gradient(90deg, color-mix(in srgb, var(--hue) 40%, transparent), var(--hue));
    border-radius: 2px;
  }

  .fab {
    position: absolute; left: 50%; bottom: 36px; transform: translateX(-50%);
    z-index: 20; height: 50px; padding: 0 22px; border: none; border-radius: 25px;
    background: var(--text-1); color: var(--ink);
    font-size: 15px; font-weight: 600; box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }

  .toast {
    position: absolute; left: 50%; bottom: 100px; z-index: 50;
    transform: translate(-50%, 16px);
    padding: 12px 18px; border-radius: 20px;
    background: rgba(20,20,28,0.92); border: 1px solid var(--hairline);
    font-family: var(--voice); font-style: italic; font-size: 14px; color: var(--text-2);
    opacity: 0; pointer-events: none; white-space: nowrap;
    transition: opacity 0.35s, transform 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  .toast.on { opacity: 1; transform: translate(-50%, 0); }

  .reset {
    appearance: none; border: 1px solid var(--hairline); background: rgba(255,255,255,0.04);
    color: var(--text-2); font-size: 12px; font-weight: 600; padding: 8px 14px;
    border-radius: 999px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="meta">
    <div class="tag">Mockup B</div>
    <h1>Swipe to rest</h1>
    <p>Drag a card left. Past the threshold, Rest arms — release, and it settles into the moon. No confirm dialog.</p>
    <a href="rest-pathway.html">← All rest mockups</a>
  </div>

  <div class="phone">
    <div class="aurora"></div>
    <div class="island"></div>
    <div class="ui">
      <div class="head">
        <div>
          <div class="greeting">Good evening.</div>
          <div class="sub" id="sub">2 pathways · swipe a card to rest</div>
        </div>
        <button class="moon-btn" id="header-moon" type="button">☾</button>
      </div>
      <div class="stats">
        <div class="c"><div class="v">12</div><div class="l">Today</div></div>
        <div class="c"><div class="v">148</div><div class="l">Lifetime</div></div>
        <div class="c"><div class="v" id="stat-active">2</div><div class="l">Active</div></div>
      </div>
      <div class="tip on hand" id="tip">
        <span class="finger"></span>
        <span>Swipe left on a pathway to rest it</span>
      </div>
      <div class="cards" id="cards"></div>
    </div>
    <button class="fab" type="button">＋&ensp;New pathway</button>
    <div class="toast" id="toast"></div>
  </div>
  <button class="reset" type="button" id="btn-reset">Reset demo</button>
</div>

<script>
const THRESHOLD = 72;
let pathways = [
  { id: "rage", name: "Road rage", hue: "var(--ember)", stage: "Thread", togo: "7 to go", p: "62%", spark: true },
  { id: "scroll", name: "Doomscrolling", hue: "var(--orchid)", stage: "Spark", togo: "18 to go", p: "28%", spark: false },
];
let resting = 0;
let tipDismissed = false;

function render() {
  const host = document.getElementById("cards");
  host.innerHTML = pathways.map(p => `
    <div class="swipe-row" data-id="${p.id}">
      <div class="action"><div class="label"><span class="ico">☾</span>Rest</div></div>
      <article class="pcard" style="--hue:${p.hue}">
        <div class="pcard-top">
          <div class="pname">${p.name}</div>
          <span class="spark ${p.spark ? "" : "dim"}">${p.spark ? "✦" : "◌"}</span>
        </div>
        <div class="pcard-meta">
          <span class="stage-l">${p.stage}</span>
          <span class="togo">${p.togo}</span>
        </div>
        <div class="thread"><i style="--p:${p.p}"></i></div>
      </article>
    </div>
  `).join("");

  host.querySelectorAll(".swipe-row").forEach(wireSwipe);
  updateChrome();
}

function updateChrome() {
  document.getElementById("stat-active").textContent = String(pathways.length);
  document.getElementById("sub").textContent =
    pathways.length === 0 ? "All pathways are resting"
    : `${pathways.length} pathway${pathways.length === 1 ? "" : "s"} · swipe left to rest`;
  document.getElementById("header-moon").classList.toggle("has-rest", resting > 0);
  if (tipDismissed || pathways.length === 0) {
    document.getElementById("tip").classList.remove("on");
  }
}

function wireSwipe(row) {
  const card = row.querySelector(".pcard");
  let startX = 0, startY = 0, dx = 0, dragging = false, axis = null;

  const setX = (x, animate) => {
    dx = Math.min(0, Math.max(x, -110));
    card.style.transform = `translateX(${dx}px)`;
    row.classList.toggle("armed", dx <= -THRESHOLD);
    card.classList.toggle("snapping", !!animate);
  };

  const onDown = (clientX, clientY) => {
    startX = clientX; startY = clientY; dx = 0; dragging = true; axis = null;
    card.classList.remove("snapping");
    // close others
    document.querySelectorAll(".swipe-row .pcard").forEach(c => {
      if (c !== card) {
        c.classList.add("snapping");
        c.style.transform = "translateX(0)";
        c.closest(".swipe-row")?.classList.remove("armed");
      }
    });
  };

  const onMove = (clientX, clientY) => {
    if (!dragging) return;
    const rawX = clientX - startX;
    const rawY = clientY - startY;
    if (!axis) {
      if (Math.abs(rawX) < 6 && Math.abs(rawY) < 6) return;
      axis = Math.abs(rawX) > Math.abs(rawY) ? "x" : "y";
    }
    if (axis !== "x") { dragging = false; return; }
    setX(rawX, false);
  };

  const onUp = () => {
    if (!dragging && axis !== "x") return;
    dragging = false;
    if (dx <= -THRESHOLD) {
      commitRest(row);
    } else {
      setX(0, true);
      row.classList.remove("armed");
    }
  };

  card.addEventListener("pointerdown", e => {
    card.setPointerCapture(e.pointerId);
    onDown(e.clientX, e.clientY);
  });
  card.addEventListener("pointermove", e => onMove(e.clientX, e.clientY));
  card.addEventListener("pointerup", onUp);
  card.addEventListener("pointercancel", onUp);
}

function commitRest(row) {
  const id = row.dataset.id;
  const p = pathways.find(x => x.id === id);
  if (!p) return;

  tipDismissed = true;
  document.getElementById("tip").classList.remove("on");

  const card = row.querySelector(".pcard");
  card.classList.add("snapping");
  card.style.transform = "translateX(-120%)";
  row.classList.add("armed");

  setTimeout(() => {
    row.classList.add("leaving");
    const moon = document.getElementById("header-moon");
    moon.classList.add("receive");
    setTimeout(() => moon.classList.remove("receive"), 700);
  }, 120);

  setTimeout(() => {
    pathways = pathways.filter(x => x.id !== id);
    resting += 1;
    render();
    showToast(`“${p.name}” is resting.`);
  }, 520);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("on"), 2400);
}

document.getElementById("btn-reset").onclick = () => {
  pathways = [
    { id: "rage", name: "Road rage", hue: "var(--ember)", stage: "Thread", togo: "7 to go", p: "62%", spark: true },
    { id: "scroll", name: "Doomscrolling", hue: "var(--orchid)", stage: "Spark", togo: "18 to go", p: "28%", spark: false },
  ];
  resting = 0;
  tipDismissed = false;
  document.getElementById("tip").classList.add("on");
  document.getElementById("header-moon").classList.remove("has-rest");
  render();
};

render();
</script>
</body>
</html>
