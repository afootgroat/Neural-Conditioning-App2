<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rewire — Hold cue A · Orb caption</title>
<style>
  :root {
    --ink: #07070C;
    --text-1: #F4F2EC;
    --text-2: #8E8E9E;
    --text-3: #55555F;
    --hairline: rgba(255,255,255,0.08);
    --accept: #3EDDC5;
    --ui: "SF Pro Text", -apple-system, "Segoe UI", system-ui, sans-serif;
    --voice: "New York", "Iowan Old Style", Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { min-height: 100%; background: #101016; font-family: var(--ui); color: var(--text-1); }
  .stage {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 28px; padding: 40px 24px;
  }
  .meta { text-align: center; max-width: 400px; }
  .meta .tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accept); font-weight: 600; margin-bottom: 8px;
  }
  .meta h1 { font-family: var(--voice); font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .meta p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

  .phone {
    position: relative; width: 390px; height: 844px; background: var(--ink);
    border-radius: 54px; overflow: hidden; flex: none;
    box-shadow: 0 0 0 10px #000, 0 0 0 12px #2a2a30, 0 40px 100px rgba(0,0,0,0.55);
  }
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 118px; height: 34px; background: #000; border-radius: 20px; z-index: 60;
  }
  .aurora {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 45% at 50% 48%, rgba(62,221,197,0.22), transparent 58%),
      radial-gradient(ellipse 90% 55% at 20% 10%, rgba(62,221,197,0.08), transparent 50%),
      var(--ink);
  }

  .header {
    position: absolute; top: 62px; left: 24px; right: 24px; z-index: 20;
    display: flex; justify-content: space-between; align-items: center;
  }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.06);
    border: none; color: var(--text-2); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .title { text-align: center; }
  .title .n { font-size: 15px; font-weight: 600; }
  .title .m {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accept); margin-top: 3px; font-weight: 600;
  }
  .spacer { width: 44px; }

  .stage-label {
    position: absolute; top: 176px; left: 0; right: 0; text-align: center; z-index: 20;
  }
  .stage-name {
    font-size: 15px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accept);
  }
  .stage-hint {
    font-family: var(--voice); font-size: 17px; color: var(--text-2); margin-top: 10px;
  }

  .orb-wrap {
    position: absolute; left: 50%; top: 52%; transform: translate(-50%, -50%);
    width: 288px; height: 288px; z-index: 10;
  }
  .orb {
    width: 100%; height: 100%; border-radius: 50%;
    background:
      radial-gradient(circle at 42% 38%, rgba(180,255,240,0.55), transparent 28%),
      radial-gradient(circle at 50% 55%, rgba(62,221,197,0.85), rgba(20,80,72,0.4) 55%, transparent 70%);
    box-shadow:
      0 0 60px rgba(62,221,197,0.35),
      0 0 120px rgba(62,221,197,0.15),
      inset 0 0 40px rgba(255,255,255,0.08);
    animation: breath 6s ease-in-out infinite;
  }
  @keyframes breath {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.03); filter: brightness(1.06); }
  }
  .arc {
    position: absolute; inset: -22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.07);
    border-top-color: var(--accept);
    border-right-color: color-mix(in srgb, var(--accept) 40%, transparent);
    transform: rotate(-90deg);
    opacity: 0.85;
  }

  /* ——— Affordance A: orb caption ——— */
  .hold-cue {
    position: absolute; left: 0; right: 0;
    top: calc(52% + 168px);
    z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: fadeRise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
  }
  @keyframes fadeRise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
  .hold-cue .glyph {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: color-mix(in srgb, var(--accept) 55%, var(--text-3));
    animation: pulseSoft 3.2s ease-in-out infinite;
  }
  @keyframes pulseSoft {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50% { opacity: 0.95; transform: scale(1.04); }
  }
  .hold-cue .glyph svg { width: 22px; height: 22px; }
  .hold-cue .label {
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    color: var(--text-3);
  }

  .counters {
    position: absolute; bottom: 64px; left: 0; right: 0; text-align: center; z-index: 20;
  }
  .counters .row { display: flex; justify-content: center; gap: 28px; align-items: center; }
  .counters .v { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .counters .l {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-3); margin-top: 4px; font-weight: 600;
  }
  .counters .sep { width: 1px; height: 26px; background: var(--hairline); }
  .next { font-size: 12px; color: var(--text-3); margin-top: 14px; font-weight: 500; }

  .nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .nav a {
    color: var(--text-2); text-decoration: none; font-size: 12px;
    padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
  }
  .nav a.here { color: var(--accept); border-color: rgba(62,221,197,0.35); }
</style>
</head>
<body>
<div class="stage">
  <div class="meta">
    <div class="tag">Mockup A · Orb caption</div>
    <h1>Hold for cue</h1>
    <p>A single quiet line under the orb — where the hand already is. Icon + four words. Nothing else.</p>
  </div>

  <div class="phone">
    <div class="aurora"></div>
    <div class="island"></div>

    <div class="header">
      <button class="icon-btn" type="button">⌄</button>
      <div class="title">
        <div class="n">Road rage</div>
        <div class="m">Foundation</div>
      </div>
      <div class="spacer"></div>
    </div>

    <div class="stage-label">
      <div class="stage-name">Accept</div>
      <div class="stage-hint">Let it be here</div>
    </div>

    <div class="orb-wrap">
      <div class="arc" aria-hidden="true"></div>
      <div class="orb" aria-hidden="true"></div>
    </div>

    <div class="hold-cue" aria-hidden="true">
      <div class="glyph">
        <!-- touch.hold metaphor -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2" opacity="0.35"/>
          <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
          <path d="M12 5.5v2.2M12 16.3v2.2M5.5 12h2.2M16.3 12h2.2" opacity="0.7"/>
        </svg>
      </div>
      <div class="label">Hold for cue</div>
    </div>

    <div class="counters">
      <div class="row">
        <div><div class="v">12</div><div class="l">Today</div></div>
        <div class="sep"></div>
        <div><div class="v">47</div><div class="l">Lifetime</div></div>
      </div>
      <div class="next">3 reps to Strengthening</div>
    </div>
  </div>

  <nav class="nav">
    <a class="here" href="hold-cue-a.html">A · Orb caption</a>
    <a href="hold-cue-b.html">B · Stage whisper</a>
    <a href="hold-cue-c.html">C · Touch mark</a>
    <a href="hold-cue.html">All three</a>
  </nav>
</div>
</body>
</html>
